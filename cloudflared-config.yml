# Cloudflare Tunnel Konfiguration für Tischplanung
# Speicherort: ~/.cloudflared/config.yml
#
# WICHTIG: Ersetzen Sie <TUNNEL-ID> mit Ihrer tatsächlichen Tunnel-ID
# Die Tunnel-ID erhalten Sie nach: cloudflared tunnel create tischplanung

tunnel: <TUNNEL-ID>
credentials-file: /root/.cloudflared/<TUNNEL-ID>.json

ingress:
  # API Backend - alle /api Anfragen
  - hostname: event.lhai.ch
    path: /api/*
    service: http://localhost:8001
  
  # Frontend - alle anderen Anfragen
  - hostname: event.lhai.ch
    service: http://localhost:3000
  
  # Catch-all (erforderlich)
  - service: http_status:404
